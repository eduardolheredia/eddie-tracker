function getWeekNumber(date){const diff=Math.floor((date-START_DATE)/(7*24*60*60*1000));return Math.max(0,diff)+1;}
function getPhase(w){return w<=4?1:w<=8?2:3;}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function fmtDate(date){return MONTHS[date.getMonth()]+' '+date.getDate()+', '+date.getFullYear();}
function dateKey(date){return date.toDateString();}

function getWorkout(dayName,date){
  const w=getWeekNumber(date);const p=getPhase(w);
  const suf=p===1?'_p1':p===2?'_p2':'_p3';
  if(dayName==='Saturday'||dayName==='Sunday')return WORKOUTS.weekend;
  const map={Monday:'push',Tuesday:'pull',Wednesday:'legs',Thursday:'push',Friday:'pull'};
  const base=map[dayName];if(!base)return null;
  return WORKOUTS[base+suf];
}

function MacroFooter({macros}){
  const pct=(v,t)=>Math.min(100,Math.round((v/t)*100));
  const col=(v,t)=>v>t*1.1?'#ef4444':v>t*0.9?'#22c55e':'#f59e0b';
  const items=[{l:'Cal',v:macros.cal,t:TARGETS.cal,s:''},{l:'Protein',v:macros.p,t:TARGETS.p,s:'g',kc:macros.p*4},{l:'Carbs',v:macros.c,t:TARGETS.c,s:'g',kc:macros.c*4},{l:'Fat',v:macros.f,t:TARGETS.f,s:'g',kc:macros.f*9}];
  return (
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:420,background:'#1e293b',borderTop:'1px solid #0f172a',padding:'8px 12px',zIndex:50}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4}}>
        {items.map(it=>(
          <div key={it.l} style={{textAlign:'center'}}>
            <div style={{fontSize:13,fontWeight:700,color:col(it.v,it.t)}}>{it.v}{it.s}</div>
            <div style={{fontSize:9,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.05em'}}>{it.l}</div>
            <div style={{height:3,background:'#0f172a',borderRadius:2,marginTop:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:pct(it.v,it.t)+'%',background:col(it.v,it.t),borderRadius:2}}/>
            </div>
            <div style={{fontSize:9,color:'#475569',marginTop:1}}>/{it.t}{it.s}</div>
            {it.kc!==undefined&&<div style={{fontSize:9,color:'#334155'}}>{it.kc}kc</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

  useEffect(()=>{try{const r=localStorage.getItem('eddie_v5');if(r)setAllState(JSON.parse(r));}catch(e){}}, []);
  const persist=(next)=>{setAllState(next);try{localStorage.setItem('eddie_v5',JSON.stringify(next));}catch(e){}};
  const getDay=()=>allState[dk]||{checked:{},exLogs:{},customEntries:[],customExercises:[],measurements:{},photos:[]};
  const setDay=(fn)=>{const prev=getDay();persist({...allState,[dk]:fn(prev)});};
  const {checked={},exLogs={},customEntries=[],customExercises=[]}=getDay();

  const toggle=(id,mealId)=>{
    setDay(prev=>{
      const next={...prev.checked,[id]:!prev.checked[id]};
      if(mealId){(BASE_MEALS[dn]||[]).forEach((m,i)=>{if(m.id===mealId)next['meal_'+i]=next[id];});}
      return {...prev,checked:next};
    });
  };
  const toggleC=(cid)=>setDay(prev=>({...prev,customEntries:(prev.customEntries||[]).map(e=>e._id===cid?{...e,checked:!e.checked}:e)}));
  const deleteC=(cid)=>setDay(prev=>({...prev,customEntries:(prev.customEntries||[]).filter(e=>e._id!==cid)}));

  const getMacros=()=>{
    let cal=0,p=0,c=0,f=0;const ml={};
    BASE_SCHEDULE.forEach(e=>{if(e.cal&&checked[e.id]){cal+=e.cal;p+=e.p;c+=e.c;f+=e.f;if(e.mealId)ml[e.mealId]=true;}});
    (BASE_MEALS[dn]||[]).forEach((m,i)=>{if(checked['meal_'+i]&&!ml[m.id]){cal+=m.cal;p+=m.p;c+=m.c;f+=m.f;}});
    (customEntries||[]).forEach(e=>{if(e.checked&&e.cal){cal+=e.cal;p+=(e.p||0);c+=(e.c||0);f+=(e.f||0);}});
    return {cal,p,c,f};
  };

  const saveExLog=()=>{
    const log=(md.weight?md.weight+' lbs':'logged')+(md.notes?' — '+md.notes:'');
    setDay(prev=>({...prev,exLogs:{...prev.exLogs,[md.exIdx]:log}}));
    closeModal();
  };
  const saveCustomEntry=()=>{
    if(!md.name)return;
    const entry={_custom:true,_id:'c_'+Date.now(),type:md.type||'meal',hour:md.hour||'Custom',name:md.name,dose:md.dose||'',detail:md.detail||'',cal:parseInt(md.cal)||0,p:parseInt(md.p)||0,c:parseInt(md.c)||0,f:parseInt(md.f)||0,checked:false};
    setDay(prev=>({...prev,customEntries:[...(prev.customEntries||[]),entry]}));
    closeModal();
  };
  const saveCustomEx=()=>{
    if(!md.exName)return;
    setDay(prev=>({...prev,customExercises:[...(prev.customExercises||[]),{name:md.exName,sets:md.exSets||''}]}));
    closeModal();
  };
  const updateCustomEx=(i)=>{
    setDay(prev=>({...prev,customExercises:(prev.customExercises||[]).map((e,idx)=>idx===i?{...e,name:md.exName,sets:md.exSets}:e)}));
    closeModal();
  };
  const saveMeasurement=()=>{
    setDay(prev=>({
      ...prev,
      measurements:{...(prev.measurements||{}),[md.site]:md.value||prev.measurements?.[md.site]},
      photos:md.photo?[...(prev.photos||[]),{site:md.site,url:md.photo,date:dk}]:(prev.photos||[])
    }));
    closeModal();
  };
  const estimateAI=async()=>{
    if(!(md.desc||'').trim())return;
    setAiLoading(true);setAiMsg('');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:'Estimate macros for: "'+md.desc+'". Reply ONLY with valid JSON: {"cal":500,"p":40,"c":45,"f":15}. No other text.'}]})});
      const data=await res.json();
      const j=JSON.parse(data.content[0].text.trim());
      setMd(prev=>({...prev,cal:j.cal||0,p:j.p||0,c:j.c||0,f:j.f||0}));
      setAiMsg('✓ Macros estimated. Review and add.');
    }catch(e){setAiMsg('Could not estimate. Enter manually.');}
    setAiLoading(false);
  };
  const closeModal=()=>{setModal(null);setMd({});setAiMsg('');};
  const macros=getMacros();
  const meals=BASE_MEALS[dn]||[];
  const sched=BASE_SCHEDULE.filter(e=>e.always||(e.mf&&isMF));
  const dayData=getDay();
  const dayM=dayData.measurements||{};
  const dayP=dayData.photos||[];

  const S={
    app:{background:'#0f172a',minHeight:'100vh',color:'#e2e8f0',maxWidth:420,margin:'0 auto',paddingBottom:90},
    hdr:{padding:'12px 16px 8px',borderBottom:'1px solid #1e293b',background:'#0f172a',position:'sticky',top:0,zIndex:20},
    mBar:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,padding:'8px 16px',background:'#1e293b',borderBottom:'1px solid #0f172a'},
    nav:{display:'flex',borderBottom:'1px solid #1e293b',background:'#0f172a',position:'sticky',top:61,zIndex:15,overflowX:'auto'},
    nBtn:(a)=>({flex:'none',minWidth:68,padding:'8px 4px',textAlign:'center',fontSize:10,cursor:'pointer',fontWeight:a?700:400,color:a?'#38bdf8':'#64748b',borderBottom:a?'2px solid #38bdf8':'2px solid transparent',textTransform:'uppercase',whiteSpace:'nowrap'}),
    card:{background:'#1e293b',borderRadius:12,overflow:'hidden',marginBottom:12},
    row:(done)=>({padding:'9px 12px',borderBottom:'1px solid #0f172a',display:'flex',alignItems:'flex-start',gap:10,background:done?'rgba(34,197,94,0.08)':'transparent'}),
    tHdr:{padding:'5px 12px',background:'#0f172a',fontSize:10,fontWeight:700,color:'#38bdf8',textTransform:'uppercase',letterSpacing:'0.08em'},
    nm:{fontSize:13,fontWeight:600,color:'#f1f5f9'},
    dt:{fontSize:11,color:'#94a3b8',marginTop:2,lineHeight:1.5},
    wn:{fontSize:10,color:'#fbbf24',marginTop:3},
    chk:(done)=>({width:26,height:26,borderRadius:'50%',border:done?'none':'1px solid #334155',background:done?'#22c55e':'#0f172a',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,marginTop:2}),
    aRow:{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',color:'#38bdf8',fontSize:13,cursor:'pointer'},
    sT:{fontSize:10,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8,padding:'12px 16px 0'},
    inp:{width:'100%',padding:'8px 10px',border:'1px solid #334155',borderRadius:8,fontSize:13,color:'#e2e8f0',background:'#0f172a',marginTop:4,boxSizing:'border-box'},
    bP:{flex:1,padding:10,background:'#0ea5e9',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer'},
    bS:{flex:1,padding:10,background:'#0f172a',color:'#94a3b8',border:'1px solid #334155',borderRadius:8,fontSize:13,cursor:'pointer'},

    del:{fontSize:10,color:'#ef4444',cursor:'pointer',padding:'1px 5px',border:'1px solid rgba(239,68,68,0.3)',borderRadius:5},

  const groupByTime=(items)=>{
    const g={};const o=[];
    items.forEach(e=>{if(!g[e.time]){g[e.time]=[];o.push(e.time);}g[e.time].push(e);});

          </div>
        </div>
      </div>

      <div style={S.mBar}>

                      <div style={{flex:1}}>
                        <Badge type={e.type} dose={e.dose}/>
                        <div style={S.nm}>{e.name}</div>
                        {e.detail&&<div style={S.dt}>{e.detail}</div>}
                        {e.warn&&<div style={S.wn}>⚠ {e.warn}</div>}
                        {(e.type==='meal'||e.type==='workout'||e.type==='supp'||e.type==='med')&&(
                          <div onClick={ev=>{ev.stopPropagation();navJump(e.type);}} style={{fontSize:10,color:TYPE_C[e.type],marginTop:3,cursor:'pointer'}}>→ view in {TYPE_L[e.type]||'section'}</div>
                        )}
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'center'}}>
                        <Chk done={done} onTap={()=>isC?toggleC(e._id):toggle(e.id,e.mealId)}/>
                        {isC&&<div onClick={()=>deleteC(e._id)} style={S.del}>del</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
            <div onClick={()=>{setModal('add');setMd({type:'meal'});}} style={S.aRow}><span style={{fontSize:16}}>+</span> Add custom entry</div>
          </div>
        </div>
      )}

      {tab==='meals'&&(
        <div style={{padding:'0 16px'}}>
          <div style={S.sT}>Meals — {dn}</div>
          <div style={S.card}>
            {meals.map((m,i)=>{const mid='meal_'+i;const done=!!checked[mid];return(
              <div key={i} onClick={()=>toggle(mid)} style={{...S.row(done),cursor:'pointer'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,fontWeight:700,color:'#22c55e',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{m.time}</div>
                  <div style={S.nm}>{m.name}</div>
                  <div style={S.dt}>{m.cal} cal · {m.p}g P · {m.c}g C · {m.f}g F</div>
                </div>
                <Chk done={done} onTap={()=>toggle(mid)}/>
              </div>
            );})}
            {(customEntries||[]).filter(e=>e.type==='meal').map(e=>(
              <div key={e._id} style={S.row(e.checked)}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,fontWeight:700,color:'#38bdf8',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>Custom · {e.hour}</div>
                  <div style={S.nm}>{e.name}</div>
                  {e.cal>0&&<div style={S.dt}>{e.cal} cal · {e.p}g P · {e.c}g C · {e.f}g F</div>}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'center'}}>
                  <Chk done={e.checked} onTap={()=>toggleC(e._id)}/>
                  <div onClick={()=>deleteC(e._id)} style={S.del}>del</div>
                </div>
              </div>
            ))}
            <div onClick={()=>{setModal('add');setMd({type:'meal'});}} style={S.aRow}><span style={{fontSize:16}}>+</span> Add custom meal</div>
          </div>
        </div>

      {tab==='workout'&&(
        <div style={{padding:'0 16px'}}>
          <div style={S.sT}>Workout — {dn} · 12:00pm</div>
          {!wkt?(
            <div style={{...S.card,padding:'24px 16px',textAlign:'center',color:'#64748b',fontSize:13,lineHeight:1.7}}>🌙 Rest day<br/><span style={{fontSize:11}}>Sleep 9pm · Wake 4am · Recovery is the work</span></div>
          ):(

              <div style={{padding:'10px 12px',borderBottom:'1px solid #0f172a'}}>
                <div style={S.nm}>{wkt.name}</div>
                <div style={S.dt}>{wkt.sub}</div>
                <div style={{fontSize:10,color:'#f59e0b',marginTop:3,fontWeight:600}}>{wkt.phase}</div>
              </div>
              {wkt.ex.map((ex,i)=>{const logged=exLogs?.[ex.id||i];return(
                <div key={ex.id||i} style={{...S.row(!!logged),cursor:'pointer'}} onClick={()=>{setModal('logEx');setMd({exIdx:ex.id||i,exName:ex.n,exSets:ex.s,exTip:ex.tip,weight:logged&&logged.includes('lb')?logged.split('lb')[0].trim():'',notes:''});}}>
                  <div style={{flex:1}}>
                    <div style={S.nm}>{ex.n}</div>
                    <div style={S.dt}>{ex.s}</div>

                </div>

                <div key={'cx'+i} style={S.row(false)}>
                  <div style={{flex:1}}>

                    <div style={S.nm}>{ex.name}</div>

                  </div>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <div onClick={()=>{setModal('editEx');setMd({customIdx:i,exName:ex.name,exSets:ex.sets});}} style={S.edt}>edit</div>
                    <div onClick={()=>setDay(prev=>({...prev,customExercises:(prev.customExercises||[]).filter((_,idx)=>idx!==i)}))} style={S.del}>del</div>

                  <div style={{fontSize:9,fontWeight:700,color:TYPE_C[s.type],textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{s.type==='med'?'Medication':'Supplement'} · {s.dose}</div>
                  <div style={S.nm}>{s.name}</div>
                  <div style={{fontSize:10,color:'#38bdf8',marginTop:2,fontWeight:600}}>⏰ {s.timing}</div>
                  <div style={S.dt}>{s.detail}</div>
                  {s.warn&&<div style={S.wn}>⚠ {s.warn}</div>}
                </div>
                <Chk done={done} onTap={()=>toggle('sup_'+s.id)}/>
              </div>

            {(customEntries||[]).filter(e=>e.type==='supp'||e.type==='med').map(e=>(
              <div key={e._id} style={S.row(e.checked)}>
                <div style={{flex:1}}>
                  <div style={{fontSize:9,fontWeight:700,color:TYPE_C[e.type],textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{TYPE_L[e.type]}</div>
                  <div style={S.nm}>{e.name}{e.dose?' · '+e.dose:''}</div>
                  {e.hour&&<div style={{fontSize:10,color:'#38bdf8',marginTop:2}}>⏰ {e.hour}</div>}
                  {e.detail&&<div style={S.dt}>{e.detail}</div>}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'center'}}>
                  <Chk done={e.checked} onTap={()=>toggleC(e._id)}/>
                  <div onClick={()=>deleteC(e._id)} style={S.del}>del</div>
                </div>

          </div>
        </div>

      {tab==='measure'&&(
        <div style={{padding:'0 16px'}}>
          <div style={S.sT}>Weekly measurements</div>

              <div style={{fontSize:10,color:'#64748b',marginTop:2}}>{MSITES.find(s=>s.id===activeSite)?.guide}</div>
            </div>
          </div>

              <div key={site.id} onClick={()=>{setActiveSite(site.id);setModal('measure');setMd({site:site.id,value:val||'',siteLabel:site.label,unit:site.unit});}} style={{...S.row(!!val),cursor:'pointer'}}>
                <div style={{fontSize:20,width:32,textAlign:'center',flexShrink:0}}>{site.icon}</div>

            {title:'Workout phases',rows:[['Weeks 1–4','Machine foundation'],['Weeks 5–8','Cables added — more range'],['Weeks 9–12','Compound focus — heavier']]},
            {title:'Macro targets',rows:[['Calories','2,000–2,100 kcal'],['Protein','150–160g · 640 kcal'],['Carbs','185–200g · 760 kcal'],['Fat','65–70g · 630 kcal'],['Hard floor','Never below 1,800 kcal']]},
            {title:'Sleep protocol',rows:[['Wake','4:00am'],['Leave home','5:00am'],['Arrive work','7:00am'],['Kitchen closes','6:00pm'],['Sermorelin','8:30pm'],['Lights out','9:00–9:30pm'],['Sleep','~7 hours']]},

                  <div key={i} style={{padding:'8px 12px',borderBottom:i<sec.rows.length-1?'1px solid #0f172a':'none',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:12,color:'#94a3b8'}}>{k}</span>
                    <span style={{fontSize:12,fontWeight:600,color:'#f1f5f9',textAlign:'right',flex:1,marginLeft:12}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      <MacroFooter macros={macros}/>

      {modal&&(
        <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)closeModal();}}>
          <div style={S.mBox}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div style={{fontSize:15,fontWeight:700,color:'#f1f5f9'}}>
                {modal==='add'?'Add custom entry':modal==='logEx'?md.exName:modal==='addEx'||modal==='editEx'?'Exercise':modal==='measure'?'Log '+md.siteLabel:'Add photo'}
              </div>
              <div onClick={closeModal} style={{cursor:'pointer',fontSize:13,color:'#64748b'}}>Close</div>
            </div>

            {modal==='add'&&(
              <div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:12,color:'#94a3b8'}}>Type</div>
                  <select value={md.type||'meal'} onChange={e=>setMd(p=>({...p,type:e.target.value}))} style={S.inp}>
                    <option value="meal">Meal</option><option value="supp">Supplement</option><option value="med">Medication</option><option value="workout">Workout</option><option value="action">Note</option>
                  </select>
                </div>
                {[['Time','hour','6:00am'],['Name','name','e.g. Magnesium'],['Dose','dose','e.g. 200mg']].map(([lbl,key,ph])=>(
                  <div key={key} style={{marginBottom:10}}>
                    <div style={{fontSize:12,color:'#94a3b8'}}>{lbl}</div>
                    <input value={md[key]||''} onChange={e=>setMd(p=>({...p,[key]:e.target.value}))} placeholder={ph} style={S.inp}/>
                  </div>
                ))}
                <div style={{marginBottom:6}}>
                  <div style={{fontSize:12,color:'#94a3b8',marginBottom:6}}>Macros (optional)</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
                    {['cal','p','c','f'].map((k,i)=>(
                      <div key={k}>
                        <div style={{fontSize:10,color:'#64748b',marginBottom:3}}>{['Cal','Prot','Carb','Fat'][i]}</div>
                        <input type="number" value={md[k]||''} onChange={e=>setMd(p=>({...p,[k]:e.target.value}))} placeholder="0" style={S.inp}/>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:6}}>
                  <div style={{fontSize:12,color:'#94a3b8',marginBottom:4}}>Describe meal for AI estimate</div>
                  <textarea value={md.desc||''} onChange={e=>setMd(p=>({...p,desc:e.target.value}))} placeholder="e.g. grilled salmon with sweet potato" style={{...S.inp,height:50,resize:'none'}}/>
                </div>
                {aiMsg&&<div style={{fontSize:11,color:aiMsg.startsWith('✓')?'#22c55e':'#fbbf24',marginBottom:8}}>{aiMsg}</div>}
                <button onClick={estimateAI} disabled={aiLoading} style={{width:'100%',padding:8,background:'#0f172a',color:'#38bdf8',border:'1px solid #334155',borderRadius:8,fontSize:13,cursor:'pointer',marginBottom:10}}>{aiLoading?'Estimating...':'Estimate macros with AI'}</button>
                <div style={{display:'flex',gap:8}}><button onClick={closeModal} style={S.bS}>Cancel</button><button onClick={saveCustomEntry} style={S.bP}>Add ↗</button></div>
              </div>
            )}

            {modal==='logEx'&&(
              <div>
                <div style={{fontSize:12,color:'#94a3b8',marginBottom:4}}>{md.exSets}</div>
                {md.exTip&&<div style={{fontSize:11,color:'#475569',marginBottom:12}}>💡 {md.exTip}</div>}
                {[['Weight used (lbs)','weight','number','e.g. 60'],['Notes','notes','text','e.g. felt strong']].map(([lbl,key,type,ph])=>(
                  <div key={key} style={{marginBottom:10}}>
                    <div style={{fontSize:12,color:'#94a3b8'}}>{lbl}</div>
                    <input type={type} value={md[key]||''} onChange={e=>setMd(p=>({...p,[key]:e.target.value}))} placeholder={ph} style={S.inp}/>
                  </div>
                ))}
                <div style={{display:'flex',gap:8,marginTop:4}}><button onClick={closeModal} style={S.bS}>Cancel</button><button onClick={saveExLog} style={S.bP}>Save ↗</button></div>
              </div>
            )}

            {(modal==='addEx'||modal==='editEx')&&(
              <div>
                {[['Exercise name','exName','text','e.g. Cable crunch'],['Sets × reps','exSets','text','e.g. 3×15']].map(([lbl,key,type,ph])=>(
                  <div key={key} style={{marginBottom:10}}>
                    <div style={{fontSize:12,color:'#94a3b8'}}>{lbl}</div>
                    <input type={type} value={md[key]||''} onChange={e=>setMd(p=>({...p,[key]:e.target.value}))} placeholder={ph} style={S.inp}/>
                  </div>
                ))}
                <div style={{display:'flex',gap:8,marginTop:4}}><button onClick={closeModal} style={S.bS}>Cancel</button><button onClick={modal==='editEx'?()=>updateCustomEx(md.customIdx):saveCustomEx} style={S.bP}>{modal==='editEx'?'Save changes':'Add ↗'}</button></div>
              </div>
            )}

            {modal==='measure'&&(
              <div>
                <div style={{marginBottom:12}}><BodyDiagram activeSite={md.site}/><div style={{textAlign:'center',marginTop:8,fontSize:11,color:'#64748b'}}>{MSITES.find(s=>s.id===md.site)?.guide}</div></div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:'#94a3b8'}}>{md.siteLabel} ({md.unit})</div>
                  <input type="number" step="0.1" value={md.value||''} onChange={e=>setMd(p=>({...p,value:e.target.value}))} placeholder={md.unit==='lbs'?'e.g. 165':'e.g. 14.5'} style={S.inp}/>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:'#94a3b8',marginBottom:6}}>Add photo (optional)</div>
                  <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setMd(p=>({...p,photo:ev.target.result}));r.readAsDataURL(f);}}/>
                  {md.photo?<img src={md.photo} alt="preview" style={{width:'100%',borderRadius:8,objectFit:'cover',maxHeight:160}}/>:<button onClick={()=>fileRef.current?.click()} style={{width:'100%',padding:10,background:'#0f172a',color:'#38bdf8',border:'1px solid #334155',borderRadius:8,fontSize:13,cursor:'pointer'}}>📷 Choose photo</button>}
                </div>
                <div style={{display:'flex',gap:8}}><button onClick={closeModal} style={S.bS}>Cancel</button><button onClick={saveMeasurement} style={S.bP}>Save ↗</button></div>
              </div>
            )}

            {modal==='addPhoto'&&(
              <div>
                <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setMd(p=>({...p,photo:ev.target.result}));r.readAsDataURL(f);}}/>
                {md.photo?<img src={md.photo} alt="preview" style={{width:'100%',borderRadius:8,objectFit:'cover',maxHeight:200,marginBottom:12}}/>:<button onClick={()=>fileRef.current?.click()} style={{width:'100%',padding:16,background:'#0f172a',color:'#38bdf8',border:'1px dashed #334155',borderRadius:8,fontSize:13,cursor:'pointer',marginBottom:12}}>📷 Choose photo from library</button>}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:'#94a3b8'}}>Label (optional)</div>
                  <input value={md.site||''} onChange={e=>setMd(p=>({...p,site:e.target.value}))} placeholder="e.g. Front, Side, Back" style={S.inp}/>
                </div>
                <div style={{display:'flex',gap:8}}><button onClick={closeModal} style={S.bS}>Cancel</button><button onClick={()=>{if(!md.photo){closeModal();return;}setDay(prev=>({...prev,photos:[...(prev.photos||[]),{site:md.site||'Progress',url:md.photo,date:dk}]}));closeModal();}} style={S.bP}>Save ↗</button></div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
